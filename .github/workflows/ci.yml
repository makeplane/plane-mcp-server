name: CI / CD

on:
  push:
    branches:
      - main
      - master
      - ai-journeys-rearchitecture
      - plane-agent
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  packages: write
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    container:
      image: python:3.12
    steps:
      - name: Setup and Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: |
           set +e
           pip install '.[dev]' pytest pytest-asyncio pytest-mock pytest-timeout respx requests-mock anyio
           pytest -v > test-output.log 2>&1
           TEST_EXIT=$?
           cat test-output.log
           exit $TEST_EXIT

  build-and-push:
    name: Build & Push Docker
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/plane-mcp-server:latest
