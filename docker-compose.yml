# Docker Compose for local development
#
# Setup:
#   cp .env.docker .env        # copy the template
#   # edit .env with your values
#   docker compose up --build
#
# The MCP server runs in HTTP mode and is available at:
#   http://localhost:8211/mcp          (OAuth)
#   http://localhost:8211/http/api-key/mcp  (header API key)

name: plane-mcp-dev

services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    # Install in editable mode so volume-mounted source changes take effect on restart
    command: >
      sh -c "uv pip install --system -e '.[dev]' && python -m plane_mcp http"
    ports:
      - "8211:8211"
    volumes:
      # Mount local source so code changes don't require a full rebuild
      - ./plane_mcp:/app/plane_mcp
    env_file:
      - .env
    environment:
      # Redis is wired automatically via the redis service below
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
